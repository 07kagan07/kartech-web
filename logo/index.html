<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KARTECH Logo</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page">

    <!-- ── Koyu ── -->
    <div class="logo-wrapper dark">
      <div class="logo">
        <div class="text-block">
          <span class="kar">KAR</span>
          <div class="right-col">
            <span class="tech">TECH</span>
            <span class="tagline">teknoloji <span class="amp">&amp;</span> güvenlik</span>
          </div>
        </div>
      </div>
    </div>

    <!-- ── Açık ── -->
    <div class="logo-wrapper light">
      <div class="logo">
        <div class="text-block">
          <span class="kar kar-light">KAR</span>
          <div class="right-col">
            <span class="tech tech-light">TECH</span>
            <span class="tagline tagline-light">teknoloji <span class="amp amp-light">&amp;</span> güvenlik</span>
          </div>
        </div>
      </div>
    </div>

  </div>
</body>
</html>
